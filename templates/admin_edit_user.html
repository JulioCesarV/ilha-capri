{% extends "base.html" %}
{% block content %}
<div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
    <div class="flex items-center gap-2 mb-6">
        <h2 class="text-2xl font-black text-slate-800 tracking-tight">Editar Cadastro</h2>
    </div>
    
    <form method="POST" class="space-y-5">
        <!-- Nome -->
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Nome Completo</label>
            <input type="text" name="nome" value="{{ u.full_name }}" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold focus:ring-2 focus:ring-blue-500" required>
        </div>

        <!-- Email -->
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">E-mail (Login)</label>
            <input type="email" name="email" value="{{ u.email }}" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold focus:ring-2 focus:ring-blue-500" required>
        </div>

        <div class="flex gap-3">
            <!-- Unidade -->
            <div class="w-1/3">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Unidade</label>
                <input type="text" name="unidade" value="{{ u.unit_number }}" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold focus:ring-2 focus:ring-blue-500" required>
            </div>
            <!-- WhatsApp -->
            <div class="w-2/3">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">WhatsApp</label>
                <input type="text" name="whatsapp" value="{{ u.whatsapp }}" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold focus:ring-2 focus:ring-blue-500" required>
            </div>
        </div>
        
        <!-- Tipo de Acesso -->
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Nível de Acesso</label>
            <select name="is_admin" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold focus:ring-2 focus:ring-blue-500">
                <option value="0" {% if u.is_admin == 0 %}selected{% endif %}>Morador Padrão</option>
                <option value="1" {% if u.is_admin == 1 %}selected{% endif %}>Administrador do Sistema</option>
            </select>
        </div>

        <div class="pt-4 space-y-3">
            <button class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-100">
                Salvar Alterações
            </button>
            <a href="/admin/usuarios" class="block text-center text-slate-400 text-sm font-bold py-2">
                Cancelar e Voltar
            </a>
        </div>
    </form>
</div>
{% endblock %}
