{% extends "base.html" %}
{% block content %}
<div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
    <h2 class="text-2xl font-black mb-6 text-blue-900">Editar Reserva</h2>
    <form method="POST" class="space-y-6">
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Data Escolhida</label>
            <input type="date" name="data" value="{{ r.reservation_date }}" class="w-full p-4 bg-slate-50 rounded-2xl border-none text-lg font-bold" required>
        </div>
        <div class="flex gap-4">
            <div class="w-1/2">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Início</label>
                <input type="time" name="inicio" value="{{ r.start_time[:5] }}" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" required>
            </div>
            <div class="w-1/2">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Fim</label>
                <input type="time" name="fim" value="{{ r.end_time[:5] }}" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" required>
            </div>
        </div>
        <button class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-lg">Salvar Alterações</button>
        <a href="/" class="block text-center text-slate-400 text-xs font-black uppercase mt-4">Voltar</a>
    </form>
</div>
{% endblock %}
