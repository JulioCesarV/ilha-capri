{% extends "base.html" %}
{% block content %}
<div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
    <h2 class="text-2xl font-bold mb-6">Acesso</h2>
    <form method="POST" class="space-y-4">
        <input type="email" name="email" placeholder="E-mail pessoal" class="w-full p-4 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500" required>
        <input type="password" name="password" placeholder="Senha" class="w-full p-4 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500" required>
        <button class="w-full bg-blue-900 text-white font-bold py-4 rounded-xl">Entrar</button>
    </form>
    <p class="mt-6 text-center text-sm">Não tem conta? <a href="/signup" class="text-blue-600 font-bold">Cadastre-se</a></p>
</div>
{% endblock %}
