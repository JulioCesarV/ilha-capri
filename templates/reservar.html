{% extends "base.html" %}
{% block content %}

<div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">

    <div class="flex items-center gap-2 mb-6">
        <a href="/" class="p-2 bg-slate-50 rounded-xl text-slate-400">
            ←
        </a>
        <h2 class="text-2xl font-black text-blue-900">Nova Reserva</h2>
    </div>

    <form method="POST" class="space-y-6">

        <div>
            <label class="text-xs font-bold text-slate-400 uppercase">Data</label>
            <input type="date" name="data"
                class="w-full h-16 p-4 bg-slate-50 rounded-2xl font-bold text-lg"
                required>
        </div>

        <div class="grid grid-cols-2 gap-4">

            <div>
                <label class="text-xs font-bold text-slate-400 uppercase">Início</label>
                <input 
                    type="text"
                    name="inicio"
                    value="09:00"
                    placeholder="HH:MM"
                    maxlength="5"
                    inputmode="numeric"
                    oninput="formatTime(this)"
                    onblur="validateTime(this)"
                    class="w-full h-16 p-4 bg-slate-50 rounded-2xl font-bold text-lg text-center tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required
                >
            </div>

            <div>
                <label class="text-xs font-bold text-slate-400 uppercase">Fim</label>
                <input 
                    type="text"
                    name="fim"
                    value="15:30"
                    placeholder="HH:MM"
                    maxlength="5"
                    inputmode="numeric"
                    oninput="formatTime(this)"
                    onblur="validateTime(this)"
                    class="w-full h-16 p-4 bg-slate-50 rounded-2xl font-bold text-lg text-center tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required
                >
            </div>

        </div>

        <button class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl text-lg">
            Confirmar Reserva
        </button>

    </form>
</div>

{% endblock %}
