{% extends "base.html" %}
{% block content %}
<div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
    <h2 class="text-2xl font-bold mb-6">Cadastro</h2>
    <form method="POST" class="space-y-4">
        <div class="flex gap-2">
            <input type="text" name="nome" placeholder="Nome" class="w-1/2 p-4 bg-slate-50 rounded-xl border-none" required>
            <input type="text" name="sobrenome" placeholder="Sobrenome" class="w-1/2 p-4 bg-slate-50 rounded-xl border-none" required>
        </div>
        <input type="email" name="email" placeholder="E-mail pessoal" class="w-full p-4 bg-slate-50 rounded-xl border-none" required>
        <input type="text" name="unidade" placeholder="Número da Unidade (Ex: 101)" class="w-full p-4 bg-slate-50 rounded-xl border-none" required>
        <input type="tel" name="whatsapp" placeholder="WhatsApp (DDD+Número)" class="w-full p-4 bg-slate-50 rounded-xl border-none" required>
        <input type="password" name="password" placeholder="Crie uma senha" class="w-full p-4 bg-slate-50 rounded-xl border-none" required>
        <input type="password" name="confirm_password" placeholder="Confirme a senha" class="w-full p-4 bg-slate-50 rounded-xl border-none" required>
        <button class="w-full bg-blue-900 text-white font-bold py-4 rounded-xl shadow-lg">Criar Conta</button>
    </form>
</div>
{% endblock %}
